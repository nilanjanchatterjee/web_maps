<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Explore Data</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Marker Cluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    #map { height: 75vh; }
    .filter-box { margin-bottom: 10px; }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-light">
  <div class="container-fluid">
    <a href="index.html">← Back to Home</a>
  </div>
</nav>

<div class="container mt-3">

  <h3>Explore Spatial Data</h3>

  <!-- Filters -->
  <div class="row">

    <div class="col-md-4 filter-box">
      <input type="text" id="speciesSearch" class="form-control" placeholder="Search species">
    </div>

    <div class="col-md-4 filter-box">
      <input type="number" id="yearMin" class="form-control" placeholder="Min Year">
    </div>

    <div class="col-md-4 filter-box">
      <input type="number" id="yearMax" class="form-control" placeholder="Max Year">
    </div>

  </div>

  <div class="row">

    <div class="col-md-6 filter-box">
      <select id="journalFilter" class="form-select">
        <option value="">All Journals</option>
      </select>
    </div>

    <div class="col-md-6 filter-box">
      <button class="btn btn-primary w-100" onclick="applyFilters()">Apply Filters</button>
    </div>

  </div>

</div>

<!-- Map -->
<div id="map"></div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

var map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var markers = L.markerClusterGroup();
let geoData;

// Load data
fetch('data/points.geojson')
  .then(res => res.json())
  .then(data => {
    geoData = data;

    populateJournalFilter(data.features);
    updateMap(data.features);

    map.addLayer(markers);
  });


// Populate journal dropdown
function populateJournalFilter(features) {
  let journals = [...new Set(features.map(f => f.properties.journal))];

  let select = document.getElementById("journalFilter");

  journals.forEach(j => {
    let opt = document.createElement("option");
    opt.value = j;
    opt.text = j;
    select.appendChild(opt);
  });
}


// Update map
function updateMap(features) {

  markers.clearLayers();

  let layer = L.geoJSON(features, {
    onEachFeature: function (feature, layer) {

      let p = feature.properties;

      layer.bindPopup(`
        <b>${p.species}</b><br>
        ${p.journal} (${p.year})<br>
        <a href="${p.doi}" target="_blank">View DOI</a>
      `);
    }
  });

  markers.addLayer(layer);
}


// Apply filters
function applyFilters() {

  let speciesQuery = document.getElementById("speciesSearch").value.toLowerCase();
  let yearMin = document.getElementById("yearMin").value;
  let yearMax = document.getElementById("yearMax").value;
  let journal = document.getElementById("journalFilter").value;

  let filtered = geoData.features.filter(f => {

    let p = f.properties;

    let matchSpecies = p.species.toLowerCase().includes(speciesQuery);
    let matchJournal = journal === "" || p.journal === journal;
    let matchYearMin = !yearMin || p.year >= yearMin;
    let matchYearMax = !yearMax || p.year <= yearMax;

    return matchSpecies && matchJournal && matchYearMin && matchYearMax;
  });

  updateMap(filtered);
}

</script>

</body>
</html>
