<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Global Species Research Database</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    #map { height: 70vh; }
  </style>
</head>

<body>

<div class="container mt-4 text-center">
  <h1>Global GPS telemetry Studies database</h1>
  <p>
    An open-access spatial database of published species studies across the globe that have used Global Positioning System (GPS) telemetry.
  </p>
</div>

<div id="map"></div>

<div class="container text-center mt-4">

  <a href="introduction.html" class="btn btn-primary m-2">About</a>
  <a href="set-up.html" class="btn btn-primary m-2">Explore Data</a>
  <a href="resources.html" class="btn btn-outline-secondary m-2">Methods</a>
  <a href="https://github.com/nilanjanchatterjee" class="btn btn-outline-dark m-2">GitHub</a>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
var map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var markers = L.markerClusterGroup();

fetch('data/points.geojson')
  .then(res => res.json())
  .then(data => {

    let layer = L.geoJSON(data, {
      onEachFeature: function (feature, layer) {

        let p = feature.properties;

        layer.bindPopup(`
          <b>${p.species}</b><br>
          ${p.journal} (${p.year})<br>
          <a href="${p.doi}" target="_blank">DOI</a>
        `);
      }
    });

    markers.addLayer(layer);
    map.addLayer(markers);
  });
</script>

</body>
</html>
